<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropitunes</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        /* Notebook background for homepage */
        body.home-page {
            background-image: url(images/notebook_background.jpg);
            background-repeat: no-repeat; 
            background-size: cover;
            background-position: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }

        .title {
            font-size: 5rem; 
            font-weight: bold;
            color: #333;
        }

        .title span {
            cursor: pointer;
            color: #007BFF;
            transition: color 0.3s, transform 0.3s, border-color 0.3s;
            display: inline-block; 
        }

        .title span:hover {
            color: #33cfff; /* Changes color on hover */
            transform: scale(2.2); /* Adds a zoom effect */
            border-color: #33cfff; 
        }

        .home-icon, .about-icon {
            position: fixed;
            top: 1.25rem; 
            font-size: 1.5rem; 
            cursor: pointer;
            color: #007BFF;
        }

        .home-icon {
            left: 1.25rem; 
        }

        .about-icon {
            left: 4.25rem; 
        }

        .home-icon:hover, .about-icon:hover {
            color: #33cfff; /* Hover effect for the icons */
        }

        .song-list {
            text-align: left;
            margin: 2rem;
        }

        .song-list h3 {
            margin-bottom: 1rem;
        }

        .song-list ul {
            list-style-type: none;
            padding: 0;
        }

        .song-list ul li {
            margin-bottom: 0.5rem;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" />
</head>
<body class="home-page">
 <!--This is for the title, so that each letter of the title is clickable-->
    <div class="container">
        <i class="fa-solid fa-house home-icon" onclick="goHome()"></i>
        <i class="fa-solid fa-circle-info about-icon" onclick="navigateTo('About')"></i>
        <h1 class="title">
            <span onclick="navigateTo('Timeless Rhymes')">T</span>
            <span onclick="navigateTo('Rhythmic Claps')">R</span>
            <span onclick="navigateTo('On-the-Go Songs')">O</span>
            <span onclick="navigateTo('Play & Learn')">P</span>
            <span onclick="navigateTo('Interesting Origins')">I</span>
        </h1>
        
        <div id="content">
            <p>Welcome to TROPITUNES!</p>
        </div>
    </div>
    
    <script>
        function navigateTo(section) {
            const content = document.getElementById('content');
            if (section === 'Timeless Rhymes') {
                content.innerHTML = `
                    <h2>${section} Songs</h2>
                    <div class="song-list">
                        <h3>Song List Organized by Alphabet</h3>
                        <ul>
                            <li>A - Song 1</li>
                            <li>B - Song 2</li>
                            <li>C - Song 3</li>
                            <li>D - Song 4</li>
                            <li>E - Song 5</li>
                        </ul>
                    </div>
                `;
            } else if (section === 'About') {
                content.innerHTML = `
                    <h2>About TROPITUNES</h2>
                    <p>TROPITUNES is a platform dedicated to providing a diverse collection of songs for all ages. Our mission is to bring joy and entertainment through music.</p>
                `;
            } else {
                content.innerHTML = `
                    <h2>${section} Songs</h2>
                    <p>Welcome to the ${section} songs section!</p>
                `;
            }
            // Hide the title on other pages
            document.querySelector('.title').style.display = 'none';

            document.body.classList.remove('home-page');
        }

        function goHome() {
            // Reload the page to go back to the home page
            window.location.reload();
        }
    </script>
</body>
</html>
